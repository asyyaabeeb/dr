<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWEET 18 // Birthday Invitation ✨</title>
    <!-- Подключаем шрифты для шикарной эстетики -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-pink: #ffb6c1; /* Нежно-розовый */
            --dark-pink: #ff69b4; /* Насыщенный розовый */
            --hot-pink: #ff1493;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 50%, #ffc0cb 100%);
            color: #4a3b42;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 15px;
            font-family: 'Montserrat', sans-serif;
            position: relative;
        }

        /* Интерактивный холст для сверкающих звезд на фоне */
        #sparkleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Основной контейнер-открытка */
        .luxury-card {
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 850px;
            width: 100%;
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.15), inset 0 0 20px rgba(255,255,255,0.5);
            z-index: 10;
            position: relative;
            animation: cardFloat 4s infinite alternate ease-in-out;
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        /* Декор в виде мишки (CSS-арт + эмодзи-анимация для милоты) */
        .bear-container {
            font-size: 5.5rem;
            line-height: 1;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 10px 15px rgba(255, 182, 193, 0.8));
            animation: bearDance 3s infinite ease-in-out;
        }

        /* Плавное покачивание мишки */
        @keyframes bearDance {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
        }

        /* Сияющие сердечки вокруг мишки */
        .bear-container::before, .bear-container::after {
            content: "✨";
            position: absolute;
            font-size: 1.5rem;
            animation: heartBlink 1.5s infinite alternate;
        }
        .bear-container::before { top: 0; left: -20px; }
        .bear-container::after { bottom: 10px; right: -20px; animation-delay: 0.5s; }

        @keyframes heartBlink {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px #fff); }
        }

        /* Текстовые стили */
        .badge {
            font-family: 'Caveat', handwriting;
            font-size: 2.2rem;
            color: var(--hot-pink);
            margin-bottom: 5px;
            display: block;
        }

    .main-title {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: linear-gradient(to right, #fff, var(--hot-pink), #fff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text; /* Добавлено стандартное свойство, чтобы убрать ошибку */
    -webkit-text-fill-color: transparent;
    animation: shineText 4s linear infinite;
    margin-bottom: 0px;
}

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .age-18 {
            font-family: 'Playfair Display', serif;
            font-size: 9rem;
            font-weight: 700;
            line-height: 0.8;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.6), 0 0 40px rgba(255, 20, 147, 0.3);
            margin: 15px 0 25px 0;
            font-style: italic;
        }

        .tagline {
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #6c535e;
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* Розовые глянцевые инфо-карточки */
        .info-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--dark-pink);
            background: rgba(255, 255, 255, 0.7);
        }

        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--dark-pink);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .card-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a3b42;
        }

        /* RSVP Форма */
        .rsvp-box {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
        }

        .rsvp-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #4a3b42;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-wrapper label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6c535e;
            font-weight: 600;
            padding-left: 4px;
        }

        input, select {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 105, 180, 0.2);
            padding: 16px;
            border-radius: 15px;
            color: #4a3b42;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--dark-pink);
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
            background: #fff;
        }

        /* Сверкающая розовая кнопка */
        .glow-button {
            background: linear-gradient(90deg, var(--dark-pink), var(--hot-pink), var(--dark-pink));
            background-size: 200% auto;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 20, 147, 0.3);
            transition: all 0.4s ease;
            width: 100%;
            max-width: 450px;
        }

        .glow-button:hover {
            background-position: right center;
            box-shadow: 0 12px 30px rgba(255, 20, 147, 0.5);
            transform: scale(1.03);
        }

        /* Адаптивность для десктопов */
        @media (min-width: 768px) {
            .info-row { grid-template-columns: repeat(3, 1fr); }
            .form-grid { grid-template-columns: repeat(3, 1fr); }
            .luxury-card { padding: 60px 45px; }
        }

        @media (max-width: 480px) {
            .main-title { font-size: 2.5rem; }
            .age-18 { font-size: 6.5rem; }
            .badge { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Холст для летящих искр и мерцания -->
    <canvas id="sparkleCanvas"></canvas>

    <div class="luxury-card">
        <!-- Анимированный Мишка -->
        <div class="bear-container">🧸</div>

        <!-- Тексты заголовков -->
        <span class="badge">Ты приглашен на</span>
        <h1 class="main-title">Sweet Birthday</h1>
        <div class="age-18">18</div>
        <p class="tagline">Праздник сияния, красоты и новой главы!</p>

        <!-- Инфо-блоки карточек -->
        <div class="info-row">
            <div class="glass-card">
                <div class="card-label">Когда / Date</div>
                <div class="card-text">Суббота, 18 Июля<br>Начало в 18:30</div>
            </div>
            <div class="glass-card">
                <div class="card-label">Где / Place</div>
                <div class="card-text">Ресторан "Pink Villa"<br>ул. Блестящая, 18</div>
            </div>
            <div class="glass-card">
                <div class="card-label">Дресс-код / Style</div>
                <div class="card-text">Shine & Розовый зефир<br>(Нежные тона, блестки)</div>
            </div>
        </div>

        <!-- Форма обратной связи -->
        <div class="rsvp-box">
            <h2 class="rsvp-title">Регистрация Гостя</h2>
            <form id="inviteForm" onsubmit="submitGuestData(event)">
                <div class="form-grid">
                    <div class="input-wrapper">
                        <label for="name">Ваше Имя и Фамилия</label>
                        <input type="text" id="name" placeholder="Ксения Королева" required>
                    </div>
                    <div class="input-wrapper">
                        <label for="status">Присутствие</label>
                        <select id="status" required>
                            <option value="yes">Да, буду сиять! ✨</option>
                            <option value="no">Не смогу прийти 💔</option>
                        </select>
                    </div>
                    <div class="input-wrapper">
                        <label for="drink">Предпочтения по напиткам</label>
                        <input type="text" id="drink" placeholder="Розовое игристое / Сок">
                    </div>
                </div>
                <button type="submit" class="glow-button" id="submitBtn">Подтвердить Вход</button>
            </form>
        </div>
    </div>

    <script>
        // --- ИНТЕГРАЦИЯ С ТЕЛЕГРАМ-БОТОМ ---
        const TG_TOKEN = '8758924028:AAFbRbkwPL3edCP7v8zhfY4N5TdFdGVBh_0';
        const TG_CHAT_ID = '1736926061';

        async function submitGuestData(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value;
            const status = document.getElementById('status').value;
            const drink = document.getElementById('drink').value || 'Не указано';
            const btn = document.getElementById('submitBtn');

            const statusAnswer = status === 'yes' ? 'Придет и будет сиять! 👑✨' : 'К сожалению, не придет 💔';

            const textMessage = `
🌸 <b>Ура! Новый ответ на 18-летие!</b> 🌸
🧸 <b>Гость:</b> ${name}
💌 <b>Статус:</b> ${statusAnswer}
🍹 <b>Напиток:</b> ${drink}
            `;

            btn.innerText = "Отправка...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TG_CHAT_ID,
                        text: textMessage,
                        parse_mode: 'HTML'
                    })
                });

                if(response.ok) {
                    alert('Прекрасно! Ваши данные успешно отправлены имениннице! До встречи ✨');
                    document.getElementById('inviteForm').reset();
                } else {
                    alert('Упс! Ошибка отправки запроса. Проверь настройки Telegram.');
                }
            } catch (err) {
                alert('Ошибка соединения. Попробуй еще раз!');
            } finally {
                btn.innerText = "Подтвердить Вход";
                btn.disabled = false;
            }
        }

        // --- ЭФФЕКТ СВЕРКАЮЩИХ ЗВЕЗД (Canvas Sparkles) ---
        const canvas = document.getElementById('sparkleCanvas');
        const ctx = canvas.getContext('2d');
        let sparkleArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Sparkle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.blinkSpeed = Math.random() * 0.02 + 0.01;
                this.alpha = Math.random();
                this.growing = true;
            }
            update() {
                if (this.growing) {
                    this.alpha += this.blinkSpeed;
                    if (this.alpha >= 1) this.growing = false;
                } else {
                    this.alpha -= this.blinkSpeed;
                    if (this.alpha <= 0) {
                        this.growing = true;
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                    }
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#fff";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // Сброс тени
            }
        }

        function initSparkles() {
            for (let i = 0; i < 70; i++) {
                sparkleArray.push(new Sparkle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            sparkleArray.forEach(sparkle => {
                sparkle.update();
                sparkle.draw();
            });
            requestAnimationFrame(animate);
        }

        initSparkles();
        animate();
    </script>
</body>
</html>
